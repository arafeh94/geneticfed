<script src="https://cdn.jsdelivr.net/npm/chart.js@3.5.1/dist/chart.min.js"></script>
<script>Array.range = (start, end) => Array.from({length: (end - start)}, (v, k) => k + start);</script>
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
      integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"
        integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n"
        crossorigin="anonymous"></script>

<style>
    #myChart {
        width: 93%;
        margin: auto;
    }

    #selform {
        width: 100%;
        height: 500px;
        margin: auto;
    }

    .column-1 {
        float: left;
        width: 40%;
    }

    .column-2 {
        float: left;
        width: 60%;
    }

    /* Clear floats after the columns */
    .row:after {
        content: "";
        display: table;
        clear: both;
    }
</style>
<div class="row">
    <div class="form-content column-1">
        <form method="post" style="margin-left: 30px">
            <div class="form-group">
                {% csrf_token %}
                <label for="selform">Select Checkpoint</label>
                <select name="run" multiple id="selform" class="form-control" style="overflow: auto">
                    {% for run in runs %}
                        <option>{{ run }}</option>
                    {% endfor %}
                </select>
                <button type="submit" class="btn-success" style="margin-top: 8px;width: 10%;">submit</button>
            </div>
        </form>
    </div>
    <div class="chart-content column-2">
        <canvas id="myChart"></canvas>
    </div>
</div>

<script>
    runs = {{ acc }};
    selected = {{ selected|safe }};

    function init() {
        if (runs.length < 0) {
            return
        }
        var ctx = document.getElementById('myChart').getContext('2d');
        const labels = Array.range(0, runs[0].length);
        datasets = []
        colors = ['#AA4499', '#DDCC77', 'blue', '#117733']
        runs.forEach(function (acc, index) {
            datasets.push({
                label: selected[index].split('_')[0],
                data: acc,
                backgroundColor: ['#712121'],
                borderColor: [colors[index % colors.length]],
                borderWidth: 2
            })
        })
        var myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: datasets
            },
        });
    }

    init()
</script>
